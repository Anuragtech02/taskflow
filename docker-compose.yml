services:
  traefik:
    image: traefik:v3.1
    restart: unless-stopped
    command:
      - "--api.dashboard=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=proxy"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:?Set ACME_EMAIL for Let's Encrypt}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--log.level=${TRAEFIK_LOG_LEVEL:-INFO}"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt_data:/letsencrypt
    networks:
      - proxy

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
      args:
        NEXT_PUBLIC_APP_URL: https://${DOMAIN:?Set DOMAIN e.g. app.taskflow.dev}
        NEXT_PUBLIC_MAIN_DOMAIN: ${MAIN_DOMAIN:?Set MAIN_DOMAIN e.g. taskflow.dev}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NEXTAUTH_URL: https://${DOMAIN}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?Set NEXTAUTH_SECRET via openssl rand -base64 32}
      NEXT_PUBLIC_APP_URL: https://${DOMAIN}
      NEXT_PUBLIC_API_URL: http://api:9001
      NEXT_PUBLIC_MAIN_DOMAIN: ${MAIN_DOMAIN}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:?Set INTERNAL_API_SECRET for service-to-service auth}
      AUTH_TRUST_HOST: "true"
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID:-}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET:-}
      AUTH_GITHUB_ID: ${AUTH_GITHUB_ID:-}
      AUTH_GITHUB_SECRET: ${AUTH_GITHUB_SECRET:-}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.taskflow.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.taskflow.entrypoints=websecure"
      - "traefik.http.routers.taskflow.tls.certresolver=letsencrypt"
      - "traefik.http.services.taskflow.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - proxy
      - internal

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: taskflow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-taskflow_secure_pwd}
      POSTGRES_DB: taskflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskflow -d taskflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  api:
    build:
      context: ../taskflow-server
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "9001"
      DATABASE_URL: postgresql://taskflow:${POSTGRES_PASSWORD:-taskflow_secure_pwd}@postgres:5432/taskflow
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?Set NEXTAUTH_SECRET via openssl rand -base64 32}
      CORS_ORIGIN: https://${DOMAIN}
      NEXT_PUBLIC_APP_URL: https://${DOMAIN}
      NEXT_PUBLIC_MAIN_DOMAIN: ${MAIN_DOMAIN}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: taskflow
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-taskflow}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-taskflow_minio_pwd}
      S3_REGION: us-east-1
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-notifications@taskflow.dev}
      CRON_API_KEY: ${CRON_API_KEY:-}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:?Set INTERNAL_API_SECRET for service-to-service auth}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.taskflow-api.rule=Host(`${API_DOMAIN:-api.${DOMAIN}}`) && !PathPrefix(`/auth/oauth`)"
      - "traefik.http.routers.taskflow-api.entrypoints=websecure"
      - "traefik.http.routers.taskflow-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.taskflow-api.loadbalancer.server.port=9001"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:9001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - proxy
      - internal

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-taskflow}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-taskflow_minio_pwd}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - internal

volumes:
  postgres_data:
  minio_data:
  letsencrypt_data:

networks:
  proxy:
    name: proxy
  internal:
